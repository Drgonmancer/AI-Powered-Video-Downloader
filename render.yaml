services:
  - type: web
    name: video-forge-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8976
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
    numInstances: 1
